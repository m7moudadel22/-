<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - الصياد</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --accent: #ffd700;
            --bg: #0a0d15;
            --dark: #0f1219;
            --card: rgba(255, 215, 0, 0.05);
            --glow: 0 0 30px rgba(255, 215, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(ellipse at center, rgba(255, 215, 0, 0.1) 0%, transparent 50%),
                        linear-gradient(135deg, var(--bg) 0%, #0f1219 100%);
            background-attachment: fixed;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-box {
            background: var(--dark);
            border: 1px solid var(--accent);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--glow);
        }

        .login-box h1 {
            text-align: center;
            color: var(--accent);
            margin-bottom: 30px;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--accent);
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 215, 0, 0.05);
            border: 2px solid var(--accent);
            border-radius: 12px;
            color: #e0e0e0;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            background: rgba(255, 215, 0, 0.1);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--accent), #ffed4e);
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
        }

        /* Admin Panel */
        .admin-container {
            display: none;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--accent);
        }

        .admin-header h1 {
            color: var(--accent);
            font-size: 28px;
        }

        .logout-btn {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            transform: scale(1.05);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 10px 20px;
            background: rgba(255, 215, 0, 0.1);
            border: 2px solid var(--accent);
            border-radius: 8px;
            color: var(--accent);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--accent);
            color: #000;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .form-section {
            background: var(--dark);
            border: 1px solid var(--accent);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: var(--glow);
        }

        .form-section h2 {
            color: var(--accent);
            margin-bottom: 20px;
            font-size: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 215, 0, 0.05);
            border: 2px solid var(--accent);
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            background: rgba(255, 215, 0, 0.1);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
        }

        .diseases-list {
            background: var(--dark);
            border: 1px solid var(--accent);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .disease-item {
            background: rgba(255, 215, 0, 0.05);
            border-right: 4px solid var(--accent);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .disease-info {
            flex: 1;
            min-width: 200px;
        }

        .disease-name {
            color: var(--accent);
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .disease-category {
            color: #aaa;
            font-size: 13px;
        }

        .disease-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .btn-edit {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
        }

        .btn-delete {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: white;
        }

        .btn-small:hover {
            transform: translateY(-2px);
        }

        .btn-add {
            background: linear-gradient(135deg, var(--accent), #ffed4e);
            color: #000;
            padding: 12px 30px;
            font-weight: 700;
            margin-top: 20px;
        }

        .btn-cancel {
            background: linear-gradient(135deg, #666, #555);
            color: white;
            padding: 12px 30px;
            font-weight: 700;
            margin-top: 20px;
            margin-right: 10px;
        }

        .success-message {
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.2), rgba(69, 160, 73, 0.2));
            border-right: 4px solid #4CAF50;
            padding: 15px;
            border-radius: 8px;
            color: #4CAF50;
            margin-bottom: 20px;
            display: none;
        }

        .success-message.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tag-input {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px;
            background: rgba(255, 215, 0, 0.05);
            border: 2px solid var(--accent);
            border-radius: 8px;
            min-height: 40px;
        }

        .tag {
            background: var(--accent);
            color: #000;
            padding: 5px 12px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .tag button {
            background: none;
            border: none;
            cursor: pointer;
            color: #000;
            font-weight: bold;
            padding: 0;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .disease-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .disease-actions {
                width: 100%;
            }

            .btn-small {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <!-- Login Container -->
    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <h1>🔐 لوحة التحكم</h1>
            <div class="form-group">
                <label for="password">كلمة السر</label>
                <input type="password" id="password" placeholder="أدخل كلمة السر">
            </div>
            <button class="btn" onclick="login()">دخول</button>
        </div>
    </div>

    <!-- Admin Container -->
    <div class="admin-container" id="adminContainer">
        <div class="admin-header">
            <h1>🔧 لوحة التحكم - الصياد</h1>
            <button class="logout-btn" onclick="logout()">تسجيل الخروج</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="addTabBtn" onclick="switchTab(event, 'add')">➕ إضافة مرض</button>
            <button class="tab-btn" onclick="switchTab(event, 'list')">📋 الأمراض</button>
            <button class="tab-btn" onclick="switchTab(event, 'stats')">📊 الإحصائيات</button>
        </div>

        <!-- Add Disease Tab -->
        <div class="tab-content active" id="addTab">
            <div class="form-section">
                <h2>إضافة مرض جديد</h2>
                <div class="success-message" id="successMessage">✓ تم الإضافة بنجاح!</div>

                <div class="form-row full">
                    <div class="form-group">
                        <label>اسم المرض</label>
                        <input type="text" id="diseaseName" placeholder="مثال: الإنفلونزا">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>الفئة</label>
                        <select id="diseaseCategory">
                            <option value="">اختر الفئة</option>
                            <option value="فيروسية">فيروسية</option>
                            <option value="بكتيرية">بكتيرية</option>
                            <option value="مزمنة">مزمنة</option>
                            <option value="هضمي">هضمي</option>
                            <option value="جلدية">جلدية</option>
                            <option value="نفسية">نفسية</option>
                            <option value="قلبية">قلبية</option>
                            <option value="شعر">شعر</option>
                            <option value="تغذية">تغذية</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>الوصف المختصر</label>
                        <input type="text" id="diseaseDescription" placeholder="وصف قصير عن المرض">
                    </div>
                </div>

                <div class="form-row full">
                    <div class="form-group">
                        <label>الأعراض (افصل بـ فاصلة)</label>
                        <input type="text" id="diseaseSymptoms" placeholder="الحمى, السعال, ألم الرأس">
                    </div>
                </div>

                <div class="form-row full">
                    <div class="form-group">
                        <label>العلاج</label>
                        <textarea id="diseaseTreatment" placeholder="وصف العلاج المناسب..."></textarea>
                    </div>
                </div>

                <div class="form-row full">
                    <div class="form-group">
                        <label>الأدوية (افصل بـ فاصلة)</label>
                        <input type="text" id="diseaseMedications" placeholder="الأسبرين, الباراسيتامول">
                    </div>
                </div>

                <div class="form-row full">
                    <div class="form-group">
                        <label>الوصفات الطبيعية</label>
                        <textarea id="diseaseRemedies" placeholder="الوصفات الطبيعية والعشبية..."></textarea>
                    </div>
                </div>

                <div class="form-row full">
                    <div class="form-group">
                        <label>الأطعمة المفيدة (افصل بـ فاصلة)</label>
                        <input type="text" id="diseaseFoods" placeholder="الزنجبيل, العسل, الليمون">
                    </div>
                </div>

                <button class="btn btn-add" onclick="addDisease()">✓ إضافة المرض</button>
            </div>
        </div>

        <!-- Diseases List Tab -->
        <div class="tab-content" id="listTab">
            <div class="diseases-list">
                <h2 style="color: var(--accent); margin-bottom: 20px;">قائمة الأمراض</h2>
                <div id="diseasesList"></div>
            </div>
        </div>

        <!-- Statistics Tab -->
        <div class="tab-content" id="statsTab">
            <div class="form-section">
                <h2>📊 الإحصائيات</h2>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px;">
                    <div style="background: rgba(255, 215, 0, 0.1); padding: 20px; border-radius: 12px; text-align: center;">
                        <div style="font-size: 32px; color: var(--accent); font-weight: bold;" id="statsTotal">0</div>
                        <div style="color: #aaa; margin-top: 10px;">إجمالي الأمراض</div>
                    </div>
                    <div style="background: rgba(255, 215, 0, 0.1); padding: 20px; border-radius: 12px; text-align: center;">
                        <div style="font-size: 32px; color: var(--accent); font-weight: bold;" id="statsCustom">0</div>
                        <div style="color: #aaa; margin-top: 10px;">أمراض مضافة</div>
                    </div>
                    <div style="background: rgba(255, 215, 0, 0.1); padding: 20px; border-radius: 12px; text-align: center;">
                        <div style="font-size: 32px; color: var(--accent); font-weight: bold;" id="statsDefault">0</div>
                        <div style="color: #aaa; margin-top: 10px;">أمراض أصلية</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "12345"; // قلل هذا إلى ما تريده

        // Check if already logged in
        window.addEventListener('load', () => {
            if (sessionStorage.getItem('adminLogged') === 'true') {
                showAdmin();
            }
        });

        function login() {
            const password = document.getElementById('password').value;
            if (password === ADMIN_PASSWORD) {
                sessionStorage.setItem('adminLogged', 'true');
                showAdmin();
            } else {
                alert('❌ كلمة السر غير صحيحة');
                document.getElementById('password').value = '';
            }
        }

        function logout() {
            sessionStorage.removeItem('adminLogged');
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('adminContainer').style.display = 'none';
            document.getElementById('password').value = '';
        }

        function showAdmin() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('adminContainer').style.display = 'block';
            loadDiseasesList();
            updateStats();
        }

        function switchTab(event, tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName + 'Tab').classList.add('active');
            if (event && event.target) {
                event.target.classList.add('active');
            }

            if (tabName === 'list') {
                loadDiseasesList();
            } else if (tabName === 'stats') {
                updateStats();
            }
        }

        function addDisease() {
            const name = document.getElementById('diseaseName').value.trim();
            const category = document.getElementById('diseaseCategory').value;
            const description = document.getElementById('diseaseDescription').value.trim();
            const symptoms = document.getElementById('diseaseSymptoms').value.split(',').map(s => s.trim()).filter(s => s);
            const treatment = document.getElementById('diseaseTreatment').value.trim();
            const medications = document.getElementById('diseaseMedications').value.split(',').map(m => m.trim()).filter(m => m);
            const remedies = document.getElementById('diseaseRemedies').value.trim();
            const foods = document.getElementById('diseaseFoods').value.split(',').map(f => f.trim()).filter(f => f);

            if (!name || !category || !description) {
                alert('❌ الرجاء ملء جميع الحقول المطلوبة');
                return;
            }

            const newDisease = {
                id: Date.now(),
                name,
                category,
                description,
                symptoms,
                treatment,
                medications,
                remedies,
                foodRecipes: foods,
                timestamp: new Date().toISOString()
            };

            // Get current diseases
            let diseases = JSON.parse(localStorage.getItem('customDiseases') || '[]');
            diseases.push(newDisease);
            localStorage.setItem('customDiseases', JSON.stringify(diseases));

            // Clear form
            document.getElementById('diseaseName').value = '';
            document.getElementById('diseaseCategory').value = '';
            document.getElementById('diseaseDescription').value = '';
            document.getElementById('diseaseSymptoms').value = '';
            document.getElementById('diseaseTreatment').value = '';
            document.getElementById('diseaseMedications').value = '';
            document.getElementById('diseaseRemedies').value = '';
            document.getElementById('diseaseFoods').value = '';

            // Show success message
            const msg = document.getElementById('successMessage');
            msg.classList.add('show');
            setTimeout(() => msg.classList.remove('show'), 3000);
        }

        function loadDiseasesList() {
            const diseases = JSON.parse(localStorage.getItem('customDiseases') || '[]');
            const container = document.getElementById('diseasesList');

            if (diseases.length === 0) {
                container.innerHTML = '<p style="color: #aaa; text-align: center; padding: 20px;">لا توجد أمراض مضافة بعد</p>';
                return;
            }

            container.innerHTML = diseases.map(disease => `
                <div class="disease-item">
                    <div class="disease-info">
                        <div class="disease-name">${disease.name}</div>
                        <div class="disease-category">📌 ${disease.category}</div>
                    </div>
                    <div class="disease-actions">
                        <button class="btn-small btn-edit" onclick="editDisease(${disease.id})">✏️ تعديل</button>
                        <button class="btn-small btn-delete" onclick="deleteDisease(${disease.id})">🗑️ حذف</button>
                    </div>
                </div>
            `).join('');
        }

        function deleteDisease(id) {
            if (confirm('⚠️ هل تريد حذف هذا المرض؟')) {
                let diseases = JSON.parse(localStorage.getItem('customDiseases') || '[]');
                diseases = diseases.filter(d => d.id !== id);
                localStorage.setItem('customDiseases', JSON.stringify(diseases));
                loadDiseasesList();
                updateStats();
            }
        }

        function editDisease(id) {
            const diseases = JSON.parse(localStorage.getItem('customDiseases') || '[]');
            const disease = diseases.find(d => d.id === id);
            
            if (disease) {
                document.getElementById('diseaseName').value = disease.name;
                document.getElementById('diseaseCategory').value = disease.category;
                document.getElementById('diseaseDescription').value = disease.description;
                document.getElementById('diseaseSymptoms').value = disease.symptoms.join(', ');
                document.getElementById('diseaseTreatment').value = disease.treatment;
                document.getElementById('diseaseMedications').value = disease.medications.join(', ');
                document.getElementById('diseaseRemedies').value = disease.remedies;
                document.getElementById('diseaseFoods').value = disease.foodRecipes.join(', ');

                // Delete old one
                deleteDisease(id);

                // Scroll to form
                document.getElementById('addTabBtn').click();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function updateStats() {
            const customDiseases = JSON.parse(localStorage.getItem('customDiseases') || '[]');
            const defaultCount = 20; // عدد الأمراض الأصلية
            const totalCount = defaultCount + customDiseases.length;

            document.getElementById('statsTotal').textContent = totalCount;
            document.getElementById('statsCustom').textContent = customDiseases.length;
            document.getElementById('statsDefault').textContent = defaultCount;
        }
    </script>
</body>
</html>
